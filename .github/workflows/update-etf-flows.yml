name: Update ETF flows

on:
  schedule:
    # ETF flow rows, especially IBIT/BlackRock, are normally available around
    # 7:00 AM Bangkok time. GitHub scheduled workflows can be delayed, so run
    # several morning retries at 8:30, 10:30, and 12:30 Bangkok time
    # (01:30/03:30/05:30 UTC), Tuesday-Saturday. The updater refuses to post
    # rows older than the previous US trading day.
    - cron: "30 1 * * 2-6"
    - cron: "30 3 * * 2-6"
    - cron: "30 5 * * 2-6"
  workflow_dispatch:
    inputs:
      diagnose_only:
        description: "Check ETF sources without posting production updates"
        required: false
        default: false
        type: boolean

jobs:
  update-etf-flows:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    env:
      BTCWINDOW_BASE_URL: ${{ vars.BTCWINDOW_BASE_URL || 'https://btcwindow.up.railway.app' }}
      ETF_ADMIN_TOKEN: ${{ secrets.ETF_ADMIN_TOKEN }}
      COINGLASS_API_KEY: ${{ secrets.COINGLASS_API_KEY }}
      SOSOVALUE_API_KEY: ${{ secrets.SOSOVALUE_API_KEY }}
      REQUEST_TIMEOUT_SECONDS: "20"
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install package
        run: python -m pip install -e .

      - name: Diagnose ETF flow sources
        if: ${{ github.event_name == 'workflow_dispatch' && inputs.diagnose_only }}
        run: python scripts/update_etf_flows.py --diagnose-sources

      - name: Update production ETF flow data
        if: ${{ github.event_name != 'workflow_dispatch' || !inputs.diagnose_only }}
        run: python scripts/update_etf_flows.py
